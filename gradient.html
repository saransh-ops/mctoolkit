<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gradient Generator — MC Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="nav-root"></div>
<main>
<div class="ph"><span class="ph-title">Gradient Generator</span><span class="ph-tag">HEX</span></div>
<p class="ps">Generate smooth HEX color gradients for Minecraft chat and signs.</p>
<div class="card" style="margin-bottom:12px">
  <div class="card-title">Text</div>
  <input type="text" id="gr-text" value="Minecraft Gradient" oninput="renderGrad()" style="margin-bottom:14px">
  <div class="row" style="gap:16px">
    <div><div class="card-title">Start Color</div><input type="color" id="gr-c1" value="#4ade80" oninput="renderGrad()"></div>
    <div><div class="card-title">End Color</div><input type="color" id="gr-c2" value="#60a5fa" oninput="renderGrad()"></div>
  </div>
</div>
<div class="card">
  <div class="card-title">Preview</div>
  <div id="gr-prev" style="font-size:22px;font-weight:700;font-family:var(--mono);background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:14px 18px;min-height:54px;margin-bottom:14px;letter-spacing:1px"></div>
  <div class="card-title">MiniMessage (Paper/Velocity)</div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
    <div id="gr-mini" style="font-family:var(--mono);font-size:11px;color:var(--m1);background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 13px;flex:1;word-break:break-all"></div>
    <button class="btn bp" style="height:34px;font-size:12px" onclick="cp(document.getElementById('gr-mini').textContent)">Copy</button>
  </div>
  <div class="card-title">§-codes (Legacy/Spigot)</div>
  <div style="display:flex;gap:8px;align-items:center">
    <div id="gr-legacy" style="font-family:var(--mono);font-size:11px;color:var(--m1);background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 13px;flex:1;word-break:break-all"></div>
    <button class="btn bp" style="height:34px;font-size:12px" onclick="cp(document.getElementById('gr-legacy').textContent)">Copy</button>
  </div>
</div>
</main>
<div class="toast" id="tst"></div>
<script src="assets/shared.js"></script>
<script>
fetch('assets/nav.html').then(r=>r.text()).then(h=>{document.getElementById('nav-root').innerHTML=h;});
function lerpHex(c1,c2,t){ const r=h=>parseInt(h.slice(1,3),16),g=h=>parseInt(h.slice(3,5),16),b=h=>parseInt(h.slice(5,7),16); const ri=Math.round(r(c1)+(r(c2)-r(c1))*t),gi=Math.round(g(c1)+(g(c2)-g(c1))*t),bi=Math.round(b(c1)+(b(c2)-b(c1))*t); return '#'+[ri,gi,bi].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function renderGrad(){
  const txt=document.getElementById('gr-text').value||'Text',c1=document.getElementById('gr-c1').value,c2=document.getElementById('gr-c2').value;
  const chars=[...txt]; const n=chars.length||1;
  const mini='<gradient:'+c1+':'+c2+'>'+txt+'</gradient>';
  document.getElementById('gr-prev').innerHTML=chars.map((ch,i)=>{ const col=lerpHex(c1,c2,i/(n-1||1)); return `<span style="color:${col}">${ch}</span>`; }).join('');
  const legacy=chars.map((ch,i)=>{ const col=lerpHex(c1,c2,i/(n-1||1)); const hx=[...col.slice(1)]; return '§x§'+hx.join('§')+ch; }).join('');
  document.getElementById('gr-mini').textContent=mini;
  document.getElementById('gr-legacy').textContent=legacy;
}
renderGrad();
</script>
</body>
</html>
